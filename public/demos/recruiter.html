<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireFlow — Recruiter demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      line-height: 1.5;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 600;
    }
    p {
      margin: 0 0 1.5rem;
      color: #8b949e;
    }
    video {
      display: block;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #161b22;
    }
    a {
      color: #79c0ff;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .back {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Recruiter walkthrough</h1>
    <p>Sync from ATS, prioritize the queue, generate AI Insights, set recommendations, and send to hiring manager.</p>
    <video controls playsinline preload="metadata" src="./recruiter.mp4"></video>
    <a class="back" href="/Hire-Flow/">← Back to HireFlow live demo</a>
  </main>
</body>
</html>
